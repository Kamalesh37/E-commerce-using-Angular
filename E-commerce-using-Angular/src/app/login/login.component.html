<div class="auth-page">
  <div class="auth-container glass-panel">
    
    <div class="auth-header">
      <h2 class="gradient-text">{{ isLoginMode ? 'Welcome Back' : 'Create an Account' }}</h2>
      <p>{{ isLoginMode ? 'Sign in to access your dashboard and order history.' : 'Join us to get exclusive offers and track your orders.' }}</p>
    </div>

    <div class="alert error" *ngIf="error">
      <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    <div class="alert success" *ngIf="successMessage">
      <i class="fas fa-check-circle"></i> {{ successMessage }}
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()" #authForm="ngForm" ngNativeValidate>
      
      <div class="form-group" *ngIf="!isLoginMode">
        <label>Full Name</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" placeholder="John Doe" name="name" [(ngModel)]="user.name" [required]="!isLoginMode">
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="you@example.com" name="email" [(ngModel)]="user.email" required>
        </div>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="••••••••" name="password" [(ngModel)]="user.password" required minlength="8">
        </div>
      </div>
      
      <div class="form-group" *ngIf="!isLoginMode">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="••••••••" name="password_confirmation" [(ngModel)]="user.password_confirmation" [required]="!isLoginMode">
        </div>
      </div>

      <button type="submit" class="btn btn-primary submit-btn" [disabled]="loading">
        <span *ngIf="loading"><i class="fas fa-spinner fa-spin"></i> Processing...</span>
        <span *ngIf="!loading">{{ isLoginMode ? 'Sign In' : 'Sign Up' }}</span>
      </button>

    </form>
    
    <div class="auth-footer">
      <p *ngIf="isLoginMode">Don't have an account? <a href="javascript:void(0)" (click)="toggleMode()">Register here</a></p>
      <p *ngIf="!isLoginMode">Already have an account? <a href="javascript:void(0)" (click)="toggleMode()">Login here</a></p>
    </div>

  </div>
</div>
