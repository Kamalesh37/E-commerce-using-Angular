<header class="glass-header">
  <div class="nav-inner">
    <div class="logo">
      <div class="svg-logo" style="display: flex; align-items: center; gap: 8px;">
        <svg height="35" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2L36 11V29L20 38L4 29V11L20 2Z" stroke="url(#logo-g1)" stroke-width="3" stroke-linejoin="round"/>
          <circle cx="20" cy="20" r="5" fill="url(#logo-g1)"/>
          <path d="M20 2V15M36 11L25 18M4 11L15 18M36 29L25 22M4 29L15 22M20 38V25" stroke="url(#logo-g1)" stroke-width="2" stroke-linecap="round"/>
          <defs>
            <linearGradient id="logo-g1" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop stop-color="#38bdf8" />
              <stop offset="1" stop-color="#818cf8" />
            </linearGradient>
          </defs>
        </svg>
        <span style="font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; color: var(--text-primary); margin: 0;">HTK</span>
      </div>
    </div>
    
    <div class="statement">
      <span class="gradient-text">Makes everything easier and reliable</span>
    </div>
    
    <button class="hamburger" (click)="toggleMobileMenu()">
      <svg *ngIf="!isMobileMenuOpen" class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      <svg *ngIf="isMobileMenuOpen" class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
    
    <nav class="nav1" [class.mobile-open]="isMobileMenuOpen">
      <ul class="nav-links" [class.show]="isMobileMenuOpen">
        <li>
          <a class="active" routerLink="Home">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            Home
          </a>
        </li>
        <li>
          <a routerLink="About">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            About
          </a>
        </li>
        <li>
          <a routerLink="Careers">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            Careers
          </a>
        </li>
        <li>
          <a routerLink="contactus">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
            Contact
          </a>
        </li>
        <li>
          <a class="theme-btn" (click)="toggleTheme()" style="cursor: pointer;">
            <svg *ngIf="!isDarkTheme" class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            <svg *ngIf="isDarkTheme" class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            {{ isDarkTheme ? 'Light Mode' : 'Dark Mode' }}
          </a>
        </li>
        <li>
          <a routerLink="checkout" style="position: relative;">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.35 2.7A1 1 0 006.5 17h12m-9 4a2 2 0 11-4 0 2 2 0 014 0zm8 0a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            Cart
            <span *ngIf="cartCount > 0" style="position: absolute; top: 2px; right: 2px; background: #ef4444; color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; font-weight: 800;">{{cartCount}}</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>
