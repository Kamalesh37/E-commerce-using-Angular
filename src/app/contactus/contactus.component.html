<div class="contact-container">
  <div class="contact-header">
    <h3 class="gradient-text">Contact Us</h3>
    <p>We'd love to hear from you</p>
  </div>
  
  <div class="form-wrapper">
    <form (submit)="sendEmail(fname.value, lname.value, email.value, phone.value, message.value); fname.value=''; lname.value=''; email.value=''; phone.value=''; message.value=''; $event.preventDefault();" class="modern-form">
      
      <div class="input-row">
        <div class="input-group">
          <label for="fname">First Name</label>
          <input type="text" #fname id="fname" placeholder="Enter first name" required>
        </div>
        <div class="input-group">
          <label for="lname">Last Name</label>
          <input type="text" #lname id="lname" placeholder="Enter last name" required>
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" #email id="email" placeholder="Enter email" required>
        </div>
        <div class="input-group">
          <label for="phone">Phone No.</label>
          <input type="text" #phone id="phone" placeholder="Enter phone no" required maxlength="10">
        </div>
      </div>

      <div class="input-group">
        <label for="message">Your Message</label>
        <textarea #message id="message" placeholder="How can we help?" required rows="5"></textarea>
      </div>

      <button type="submit" class="submit-btn"><i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Send Message</button>
    </form>
  </div>
</div>
